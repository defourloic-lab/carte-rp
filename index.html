<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Carte RP</title>

  <style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* 📦 MAP */
#map {
  position: relative;
  display: inline-block;
  width: 90vw;
  max-width: 1400px;
  border: 2px solid white;
}

#map img {
  width: 100%;
  display: block;
}

/* 📍 DRAPEAU */
.flag {
  position: absolute;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  pointer-events: auto;
}

/* 🎨 couleurs */
.neutral { background: gray; }
.konoha { background: blue; }
.suna { background: orange; }

/* 🏷️ NOM */
.flag div:first-child {
  position: absolute;
  top: -42px;
  font-size: 12px;
  white-space: nowrap;
  background: rgba(0,0,0,0.6);
  padding: 2px 6px;
  border-radius: 4px;
}

/* ⏱️ TIMER */
.timer {
  position: absolute;
  top: -20px;
  font-size: 10px;
  background: rgba(0,0,0,0.6);
  padding: 2px 4px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: auto;
}

/* 🔥 CAPTURE TIMER */
.flag div:last-child {
  position: absolute;
  top: 20px;
  font-size: 10px;
  background: rgba(0,0,0,0.6);
  padding: 2px 4px;
  border-radius: 4px;
  white-space: nowrap;
  cursor: pointer;
}

/* ✨ HOVER */
.flag:hover {
  transform: translate(-50%, -50%) scale(1.2);
}

/* 🔥 CLIGNOTEMENT */
@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.2; }
  100% { opacity: 1; }
}

/* utilisé quand capturable */
.flag.blink {
  animation: blink 1s infinite;
}
  </style>
</head>

<body>

<h2>Carte RP - Drapeaux</h2>

<div id="map">
  <img id="mapImg" src="map.png">
</div>

<script type="module" src="app.js"></script>

</body>
</html>
